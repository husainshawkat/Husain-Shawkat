<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Husain Shawkat Gallery</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#121212;
color:white;
}

/* header */

header{
text-align:center;
padding:40px 20px;
}

header h1{
font-size:3rem;
background:linear-gradient(45deg,#ff7e5f,#feb47b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#aaa;
margin-top:10px;
}

/* filter */

.filter-buttons{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.filter-btn{
border:none;
padding:10px 20px;
border-radius:30px;
background:#333;
color:white;
cursor:pointer;
}
